# SonarCloud Configuration
# Identificador único del proyecto en SonarCloud
sonar.projectKey=fabrica-escuela

# Organización en SonarCloud (usa la organization key, no el nombre visible)
sonar.organization=fabrica-escuela

# URL de SonarCloud
sonar.host.url=https://sonarcloud.io

# Nombre del proyecto
sonar.projectName=Financial Management App

# Descripción del proyecto
sonar.projectDescription=Aplicación de gestión financiera desarrollada con Spring Boot

# Versión del proyecto
sonar.projectVersion=0.0.1-SNAPSHOT

# Ruta base del proyecto
sonar.sources=src/main/java,src/main/resources

# Ruta de pruebas
sonar.tests=src/test/java

# Exclusiones
sonar.exclusions=**/config/**

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage (si usas JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Calidad de puerta (Quality Gate)
sonar.qualitygate.wait=true
